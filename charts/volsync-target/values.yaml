# -- Default pattern follows <pvcTarget>-backup
nameOverride: ""

# -- Override the namespace of the chart
namespaceOverride: ""

# -- Kubernetes cluster name
kubernetesClusterName: cl01tl

# -- Add additional labels
additionalLabels: {}

# -- Name of the PVC target
pvcTarget: "data"

# -- Glocal security context for restic mover
moverSecurityContext: {}

# -- Use external secrets
externalSecrets:
  enabled: true

# -- Local backup configuration
local:
  enabled: false

  # -- 5 character cron schedule
  schedule: 0 8 * * *

  # -- Backup configuration, inserted directly into the yaml
  restic:
    pruneIntervalDays: 7
    repository: ""
    retain:
      hourly: 0
      daily: 7
      weekly: 4
      monthly: 3
      yearly: 1
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi

  # -- External Secret configuration
  externalSecret:
    # This path must contain the BUCKET_ENDPOINT
    bucketPath: /garage/config
    # This path must contain the AWS/S3 credentials and RESTIC_PASSWORD
    credentialPath: /garage/home-infra/volsync-backups

# -- Remote backup configuration
remote:
  enabled: false

  # -- 5 character cron schedule
  schedule: 0 10 * * *

  # -- Backup configuration, inserted directly into the yaml
  restic:
    pruneIntervalDays: 7
    repository: ""
    retain:
      hourly: 0
      daily: 7
      weekly: 4
      monthly: 3
      yearly: 1
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi

  # -- External Secret configuration
  externalSecret:
    # This path must contain the BUCKET_ENDPOINT
    bucketPath: /garage/config
    # This path must contain the AWS/S3 credentials and RESTIC_PASSWORD
    credentialPath: /garage/home-infra/volsync-backups

# -- External backup configuration
external:
  enabled: true

  # -- 5 character cron schedule
  schedule: 0 9 * * *

  # -- Backup configuration, inserted directly into the yaml
  restic:
    pruneIntervalDays: 7
    repository: ""
    retain:
      hourly: 0
      daily: 7
      weekly: 4
      monthly: 3
      yearly: 1
    copyMethod: Snapshot
    storageClassName: ceph-block
    volumeSnapshotClassName: ceph-blockpool-snapshot
    cacheCapacity: 1Gi

  # -- External Secret configuration
  externalSecret:
    # This path must contain the ENDPOINT
    bucketPath: /digital-ocean/config
    # This path must contain the AWS/S3 credentials and RESTIC_PASSWORD
    credentialPath: /digital-ocean/home-infra/volsync-backups
