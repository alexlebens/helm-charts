suite: test Service generation
templates:
  - charts/valkey/templates/service.yaml
tests:
  - it: should generate a Service
    asserts:
      - isKind:
          of: Service
      - hasDocuments:
          count: 1

  - it: should have ClusterIP type by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose port 6379
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 6379

  - it: should configure custom service type
    set:
      valkey:
        service:
          type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer
