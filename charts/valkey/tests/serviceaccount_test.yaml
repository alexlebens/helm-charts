suite: test ServiceAccount generation
templates:
  - charts/valkey/templates/serviceaccount.yaml
tests:
  - it: should generate a ServiceAccount when create is true
    asserts:
      - isKind:
          of: ServiceAccount
      - hasDocuments:
          count: 1

  - it: should not generate a ServiceAccount when create is false
    set:
      valkey:
        serviceAccount:
          create: false
    asserts:
      - hasDocuments:
          count: 0
