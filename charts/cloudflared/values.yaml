# -- Name override of release
name: ""

# -- Protocol - Available values are auto, http2, and quic.
protocol: auto

# -- Metrics
metrics:
  enabled: true

# -- Secret configuration
secret:

  # -- External Secret configuration
  externalSecret:
    enabled: true
    nameOverride: ""

    # -- Cluster store config
    store:
      name: openbao
      path: /cloudflare/tunnels
      property: token

    # -- Add additional labels
    additionalLabels: {}

  # -- Name of existing secret that contains Cloudflare token
  existingSecret:
    name: cloudflared-secret
    key: cf-tunnel-token

# -- Default image
image:
  repository: cloudflare/cloudflared
  tag: 2026.5.2@sha256:12ff5c6992a9863db4da270746af7c244bcaee49353039af8104268a18d6c4f0
  pullPolicy: IfNotPresent

# -- Default resources
resources:
  requests:
    cpu: 1m
    memory: 20Mi
