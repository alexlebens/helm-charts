# -- Name override of release
name: ""

# -- Number of replicas for high availability (Cloudflare recommends at least 2)
replicas: 2

# -- Protocol - Available values are auto, http2, and quic.
protocol: auto

# -- Additional arguments to pass to the cloudflared container
extraArgs: []

# -- Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

# -- Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Probes configuration
probes:
  liveness:
    enabled: true
  readiness:
    enabled: true

# -- Metrics
metrics:
  enabled: true
  prometheusRule:
    enabled: true
    # -- PrometheusRule additional labels
    labels: {}
    # -- Prometheus rules
    rules:
      - alert: CloudflaredDown
        expr: cloudflared_tunnel_active == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Cloudflared tunnel {{ $labels.tunnel_id }} is down"
          description: "Cloudflared tunnel has lost connection to the edge."

# -- Secret configuration
secret:

  # -- External Secret configuration
  externalSecret:
    enabled: true
    nameOverride: ""

    # -- Cluster store config
    store:
      name: openbao
      path: /cloudflare/tunnels
      property: token

    # -- Add additional labels
    additionalLabels: {}

  # -- Name of existing secret that contains Cloudflare token
  existingSecret:
    name: cloudflared-secret
    key: cf-tunnel-token

# -- Default image
image:
  repository: cloudflare/cloudflared
  tag: 2026.6.1@sha256:6d91c121b803126f7a5344005d17a9324788fc09d305b6e2560ec6040a7ae283
  pullPolicy: IfNotPresent

# -- Default resources
resources:
  requests:
    cpu: 1m
    memory: 20Mi
