{{- if .Values.probe.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: {{ include "cloudflared.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "cloudflared.name" . }}
    {{- include "cloudflared.labels" . | nindent 4 }}
    {{- with .Values.probe.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  prober:
    url: {{ .Values.probe.proberUrl }}
  module: {{ .Values.probe.module }}
  targets:
    staticConfig:
      static:
        - {{ .Values.probe.targetUrl | required "probe.targetUrl is required when probe is enabled" }}
{{- end }}
