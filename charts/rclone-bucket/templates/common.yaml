{{- include "bjw-s.common.loader.init" . }}

{{- define "rclone.hardcodedValues" -}}
global:
  nameOverride: {{ include "rclone.name" . }}
  fullNameOverride: {{ include "rclone.name" . }}
  createDefaultServiceAccount: true
controllers:
  main:
    type: cronjob
    {{- with .Values.cronJob }}
    cronjob:
      {{- toYaml . | nindent 6 }}
    {{ end }}
    serviceAccount:
      identifier: {{ .Release.Name }}
    containers:
      sync:
        image:
          repository: {{ .Values.image.repository }}
          tag: {{ .Values.image.tag }}
          pullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /bin/sh
          - -c
        args:
          - |
            rclone sync \
              "src:{{ .Values.rclone.source.bucketName }}" \
              "dest:{{ .Values.rclone.destination.bucketName }}" \
              --s3-no-check-bucket \
              {{- if .Values.prune.enabled }}
              --max-age {{ .Values.prune.ageToPrune | quote }} \
              {{- end }}
              {{- if .Values.prune.include }}
              --include {{ .Values.prune.include | quote }} \
              {{- end }}
              {{- if .Values.prune.exclude }}
              --exclude {{ .Values.prune.exclude | quote }} \
              {{- end }}
              {{- if .Values.metrics.enabled }}
              --rc --rc-addr=0.0.0.0:5572 --rc-enable-metrics --rc-no-auth \
              {{- end }}
              --verbose > /tmp/rclone-sync.log 2>&1

            res=$?
            cat /tmp/rclone-sync.log

            {{- if .Values.ntfy.enabled }}
            STATS=$(grep "Transferred:" /tmp/rclone-sync.log | tail -n 2)
            DATA_TRANS=$(echo "$STATS" | head -n 1 | sed 's/.*Transferred:[ \t]*//')

            if [ -z "$DATA_TRANS" ]; then
              DATA_TRANS="Unknown"

            fi

            TARGET_URL="{{ .Values.ntfy.url }}"
            if [ -n "${NTFY_URL:-}" ]; then
              TARGET_URL="$NTFY_URL"
            fi

            if [ $res -eq 0 ]; then
              wget -qO- --header "Title: Rclone Sync Success - {{ .Values.rclone.source.bucketName }}" --header "Priority: default" --post-data "Job for bucket {{ .Values.rclone.source.bucketName }} transferred: $DATA_TRANS" "$TARGET_URL"
            else
              wget -qO- --header "Title: Rclone Sync Failed - {{ .Values.rclone.source.bucketName }}" --header "Priority: urgent" --post-data "Job for {{ .Values.rclone.source.bucketName }} failed, but transferred: $DATA_TRANS" "$TARGET_URL"
            fi
            {{- end }}
            exit $res
        env:
          - name: RCLONE_S3_PROVIDER
            value: {{ .Values.rclone.providerType }}
          - name: RCLONE_CONFIG_SRC_TYPE
            value: s3
          - name: RCLONE_CONFIG_SRC_PROVIDER
            value: {{ .Values.rclone.source.providerType }}
          - name: RCLONE_CONFIG_SRC_ENV_AUTH
            value: "false"
          - name: RCLONE_CONFIG_SRC_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.sourceSecretName" . }}
                key: {{ include "secretRclone.envAccessKey" . }}
          - name: RCLONE_CONFIG_SRC_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.sourceSecretName" . }}
                key: {{ include "secretRclone.envSecretKey" . }}
          - name: RCLONE_CONFIG_SRC_REGION
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.sourceSecretName" . }}
                key: {{ include "secretRclone.envRegion" . }}
          - name: RCLONE_CONFIG_SRC_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.sourceSecretName" . }}
                key: {{ include "secretRclone.envSrcEndpoint" . }}
          - name: RCLONE_CONFIG_SRC_FORCE_PATH_STYLE
            value: {{ .Values.rclone.source.forcePathStyle | quote }}
          - name: RCLONE_CONFIG_DEST_TYPE
            value: s3
          - name: RCLONE_CONFIG_DEST_PROVIDER
            value: {{ .Values.rclone.destination.providerType }}
          - name: RCLONE_CONFIG_DEST_ENV_AUTH
            value: "false"
          - name: RCLONE_CONFIG_DEST_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.destinationSecretName" . }}
                key: {{ include "secretRclone.envAccessKey" . }}
          - name: RCLONE_CONFIG_DEST_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.destinationSecretName" . }}
                key: {{ include "secretRclone.envSecretKey" . }}
          - name: RCLONE_CONFIG_DEST_REGION
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.destinationSecretName" . }}
                key: {{ include "secretRclone.envRegion" . }}
          - name: RCLONE_CONFIG_DEST_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.destinationSecretName" . }}
                key: {{ include "secretRclone.envDestEndpoint" . }}
          - name: RCLONE_CONFIG_DEST_FORCE_PATH_STYLE
            value: {{ .Values.rclone.destination.forcePathStyle | quote }}
          {{- if and .Values.ntfy.enabled (or .Values.ntfy.externalSecret.enabled .Values.ntfy.existingSecret.name) }}
          - name: NTFY_URL
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.ntfySecretName" . }}
                {{- if .Values.ntfy.existingSecret.name }}
                key: {{ .Values.ntfy.existingSecret.key | default "ntfy-url" }}
                {{- else }}
                key: ntfy-url
                {{- end }}
          {{- end }}
      {{- if .Values.prune.enabled }}
      prune:
        image:
          repository: {{ .Values.image.repository }}
          tag: {{ .Values.image.tag }}
          pullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - /bin/sh
          - -c
        args:
          - |
            rclone delete \
              "dest:{{ .Values.rclone.destination.bucketName }}" \
              --min-age {{ .Values.prune.ageToPrune | quote }} \
              {{- if .Values.metrics.enabled }}
              --rc --rc-addr=0.0.0.0:5573 --rc-enable-metrics --rc-no-auth \
              {{- end }}
              --verbose > /tmp/rclone-prune.log 2>&1

            res=$?
            cat /tmp/rclone-prune.log

            {{- if .Values.ntfy.enabled }}
            STATS=$(grep "Deleted:" /tmp/rclone-prune.log | tail -n 1)
            FILES_PRUNED=$(echo "$STATS" | sed 's/.*Deleted:[ \t]*//')

            if [ -z "$FILES_PRUNED" ]; then
              FILES_PRUNED="0 files"

            fi

            TARGET_URL="{{ .Values.ntfy.url }}"
            if [ -n "${NTFY_URL:-}" ]; then
              TARGET_URL="$NTFY_URL"
            fi

            if [ $res -eq 0 ]; then
              wget -qO- --header "Title: Rclone Prune Success  - {{ .Values.rclone.source.bucketName }}" --header "Priority: default" --post-data "Rclone prune job for bucket '{{ .Values.rclone.destination.bucketName }}' pruned: $FILES_PRUNED" "$TARGET_URL"
            else
              wget -qO- --header "Title: Rclone Prune Failed - {{ .Values.rclone.source.bucketName }}" --header "Priority: urgent" --post-data "Rclone prune job for bucket '{{ .Values.rclone.destination.bucketName }}' failed, but did prune: $FILES_PRUNED" "$TARGET_URL"
            fi
            {{- end }}
            exit $res
        env:
          - name: RCLONE_CONFIG_DEST_TYPE
            value: s3
          - name: RCLONE_CONFIG_DEST_PROVIDER
            value: {{ .Values.rclone.destination.providerType }}
          - name: RCLONE_CONFIG_DEST_ENV_AUTH
            value: "false"
          - name: RCLONE_CONFIG_DEST_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.destinationSecretName" . }}
                key: {{ include "secretRclone.envAccessKey" . }}
          - name: RCLONE_CONFIG_DEST_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.destinationSecretName" . }}
                key: {{ include "secretRclone.envSecretKey" . }}
          - name: RCLONE_CONFIG_DEST_REGION
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.destinationSecretName" . }}
                key: {{ include "secretRclone.envRegion" . }}
          - name: RCLONE_CONFIG_DEST_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.destinationSecretName" . }}
                key: {{ include "secretRclone.envDestEndpoint" . }}
          - name: RCLONE_CONFIG_DEST_FORCE_PATH_STYLE
            value: {{ .Values.rclone.destination.forcePathStyle | quote }}
          {{- if and .Values.ntfy.enabled (or .Values.ntfy.externalSecret.enabled .Values.ntfy.existingSecret.name) }}
          - name: NTFY_URL
            valueFrom:
              secretKeyRef:
                name: {{ include "rclone.ntfySecretName" . }}
                {{- if .Values.ntfy.existingSecret.name }}
                key: {{ .Values.ntfy.existingSecret.key | default "ntfy-url" }}
                {{- else }}
                key: ntfy-url
                {{- end }}
          {{- end }}
      {{- end }}
{{- if .Values.metrics.enabled }}
service:
  main:
    controller: main
    ports:
      rc-sync:
        port: 5572
        targetPort: 5572
      rc-prune:
        port: 5573
        targetPort: 5573
serviceMonitor:
  main:
    selector:
      matchLabels:
        app.kubernetes.io/name: {{ include "rclone.name" . }}
        app.kubernetes.io/instance: {{ .Release.Namespace }}
    serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}'
    endpoints:
      - port: rc-sync
        interval: 10s
        scrapeTimeout: 5s
        path: /metrics
      - port: rc-prune
        interval: 10s
        scrapeTimeout: 5s
        path: /metrics
{{- end }}
{{- end -}}
{{- $_ := mergeOverwrite .Values (include "rclone.hardcodedValues" . | fromYaml) -}}

{{/* Render the templates */}}
{{ include "bjw-s.common.loader.generate" . }}
