suite: test Monitoring generation
templates:
  - pod-monitor.yaml
  - prometheus-rule.yaml
  - config-map.yaml
tests:
  - it: should generate Monitoring resources by default
    asserts:
      - template: pod-monitor.yaml
        hasDocuments:
          count: 1
      - template: prometheus-rule.yaml
        hasDocuments:
          count: 1
      - template: pod-monitor.yaml
        isKind:
          of: PodMonitor
      - template: prometheus-rule.yaml
        isKind:
          of: PrometheusRule
      - template: config-map.yaml
        hasDocuments:
          count: 0

  - it: should not generate Monitoring resources when disabled
    set:
      cluster:
        monitoring:
          enabled: false
    asserts:
      - template: pod-monitor.yaml
        hasDocuments:
          count: 0
      - template: prometheus-rule.yaml
        hasDocuments:
          count: 0

  - it: should disable only PodMonitor
    set:
      cluster:
        monitoring:
          enabled: true
          podMonitor:
            enabled: false
          prometheusRule:
            enabled: true
    asserts:
      - template: pod-monitor.yaml
        hasDocuments:
          count: 0
      - template: prometheus-rule.yaml
        hasDocuments:
          count: 1
      - template: prometheus-rule.yaml
        isKind:
          of: PrometheusRule

  - it: should generate ConfigMap for custom queries
    set:
      cluster:
        monitoring:
          enabled: true
          customQueries:
            - name: pg_cache_hit_ratio
              query: "SELECT current_database() as datname, sum(heap_blks_hit) / (sum(heap_blks_hit) + sum(heap_blks_read)) as ratio FROM pg_statio_user_tables;"
              metrics:
                - datname:
                    usage: "LABEL"
                    description: "Name of the database"
                - ratio:
                    usage: GAUGE
                    description: "Cache hit ratio"
    asserts:
      - template: config-map.yaml
        hasDocuments:
          count: 1
      - template: config-map.yaml
        isKind:
          of: ConfigMap
