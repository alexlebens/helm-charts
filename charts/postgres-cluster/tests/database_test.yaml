suite: test Database generation
templates:
  - database.yaml
tests:
  - it: should not generate any Database resources by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should generate Database resources when configured
    set:
      databases:
        - name: test-db-1
          ensure: present
          owner: app
        - name: test-db-2
          ensure: present
          owner: app
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Database
        documentIndex: 0
      - equal:
          path: spec.name
          value: test-db-1
        documentIndex: 0
      - equal:
          path: spec.ensure
          value: present
        documentIndex: 0
      - equal:
          path: spec.owner
          value: app
        documentIndex: 0
      - matchRegex:
          path: spec.cluster.name
          pattern: .*-cluster
        documentIndex: 0
      - isKind:
          of: Database
        documentIndex: 1
      - equal:
          path: spec.name
          value: test-db-2
        documentIndex: 1
      - equal:
          path: spec.ensure
          value: present
        documentIndex: 1
      - equal:
          path: spec.owner
          value: app
        documentIndex: 1

  - it: should generate Database with extensions and schemas
    set:
      databases:
        - name: app
          owner: app
          schemas:
            - name: myschema
              owner: app
          extensions:
            - name: pg_search
              version: "0.15.21"
            - name: vector
              ensure: present
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.schemas[0].name
          value: myschema
      - equal:
          path: spec.schemas[0].owner
          value: app
      - equal:
          path: spec.extensions[0].name
          value: pg_search
      - equal:
          path: spec.extensions[0].version
          value: "0.15.21"
      - equal:
          path: spec.extensions[1].name
          value: vector

  - it: should set connection limit on Database
    set:
      databases:
        - name: limited-db
          owner: app
          connectionLimit: 50
    asserts:
      - equal:
          path: spec.connectionLimit
          value: 50
