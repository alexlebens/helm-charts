suite: test ScheduledBackup generation
templates:
  - scheduled-backup.yaml
tests:
  - it: should not generate a ScheduledBackup by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should not generate a ScheduledBackup when enabled but objectStore is disabled
    set:
      backup:
        objectStore:
          enabled: false
        scheduledBackup:
          enabled: true
          schedule: "0 0 0 * * *"
    asserts:
      - hasDocuments:
          count: 0

  - it: should generate a ScheduledBackup when both enabled and objectStore enabled
    set:
      backup:
        objectStore:
          enabled: true
          endpointURL: "https://s3.example.com"
          endpointCredentials:
            createExternalSecret: true
            externalSecretCredentialPath: "secret/path"
        scheduledBackup:
          enabled: true
          schedule: "0 0 0 * * *"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ScheduledBackup
      - equal:
          path: spec.schedule
          value: "0 0 0 * * *"
