suite: test DatabaseRole generation
templates:
  - database-role.yaml
tests:
  - it: should generate a DatabaseRole when roles are defined
    set:
      roles:
        - name: app_user
          login: true
    asserts:
      - isKind:
          of: DatabaseRole
      - equal:
          path: spec.name
          value: app_user
      - equal:
          path: spec.login
          value: true
      - matchRegex:
          path: spec.cluster.name
          pattern: .*-cluster

  - it: should not generate any DatabaseRoles when empty
    set:
      roles: []
    asserts:
      - hasDocuments:
          count: 0

  - it: should generate a DatabaseRole with full configuration
    set:
      roles:
        - name: readonly_user
          login: true
          connectionLimit: 10
          inRoles:
            - pg_read_all_data
          passwordSecret:
            name: my-role-secret
    asserts:
      - isKind:
          of: DatabaseRole
      - equal:
          path: spec.name
          value: readonly_user
      - equal:
          path: spec.login
          value: true
      - equal:
          path: spec.connectionLimit
          value: 10
      - equal:
          path: spec.inRoles[0]
          value: pg_read_all_data
      - equal:
          path: spec.passwordSecret.name
          value: my-role-secret

  - it: should generate multiple DatabaseRole resources
    set:
      roles:
        - name: role1
        - name: role2
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-postgresql-18-role-role1
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-postgresql-18-role-role2
        documentIndex: 1
