  namespace: {{ include "cluster.namespace" $context }}
  labels:
    app.kubernetes.io/name: {{ include "cluster.recoveryName" $context }}
    {{- include "cluster.labels" $context | nindent 4 }}
spec:
  configuration:
    destinationPath: {{ include "cluster.recoveryDestinationPath" $context }}
    endpointURL: {{ .endpointURL }}
    {{- if .endpointCA }}
    {{- if or .endpointCA.name .endpointCA.createExternalSecret }}
    endpointCA:
      name: {{ include "cluster.recoveryCaSecretName" $context }}
      key: {{ .endpointCA.key | default "ca.crt" }}
    {{- end }}
    {{- end }}
    {{- with .wal }}
    wal:
      compression: {{ .compression | default "snappy" }}
      {{- if .encryption }}
      encryption: {{ .encryption }}
      {{- end }}
      maxParallel: {{ .maxParallel | default "2" }}
    {{- end }}
    {{- with .data }}
    data:
      compression: {{ .compression | default "snappy" }}
      {{- if .encryption }}
      encryption: {{ .encryption }}
      {{- end }}
      jobs: {{ .jobs | default 2 }}
    {{- end }}
    s3Credentials:
      accessKeyId:
        name: {{ include "cluster.recoverySecretName" $context }}
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: {{ include "cluster.recoverySecretName" $context }}
        key: ACCESS_SECRET_KEY
      region:
        name: {{ include "cluster.recoverySecretName" $context }}
        key: ACCESS_REGION
{{- end }}
{{- end }}
