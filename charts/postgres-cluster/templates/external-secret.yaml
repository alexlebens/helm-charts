{{- if and (eq .Values.backup.method "objectStore") (.Values.backup.externalSecret.enabled) }}
{{- $context := . }}
{{- with .Values.backup.objectStore }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "cluster.backupSecretName" $context }}
  namespace: {{ include "cluster.namespace" $context }}
  labels:
    app.kubernetes.io/name: {{ include "cluster.backupSecretName" $context }}
    {{- include "cluster.labels" $context | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: ACCESS_REGION
      remoteRef:
        key: {{ .externalSecretCredentialPath | required "External Secret Credential local path is required" }}
        property: ACCESS_REGION
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: {{ .externalSecretCredentialPath | required "External Secret Credential local path is required" }}
        property: ACCESS_KEY_ID
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: {{ .externalSecretCredentialPath | required "External Secret Credential local path is required" }}
        property: ACCESS_SECRET_KEY

{{- with .endpointCA }}
{{- if .createExternalSecret }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "cluster.backupCaSecretName" $context }}
  namespace: {{ include "cluster.namespace" $context }}
  labels:
    app.kubernetes.io/name: {{ include "cluster.backupCaSecretName" $context }}
    {{- include "cluster.labels" $context | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: {{ .key | default "ca.crt" }}
      remoteRef:
        key: {{ .externalSecretCredentialPath | required "External Secret Credential local path is required for CA" }}
        property: {{ .externalSecretProperty | default "ca.crt" }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

{{- if and (eq .Values.recovery.method "objectStore") (.Values.recovery.objectStore.externalSecret.enabled) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "cluster.recoverySecretName" . }}
  namespace: {{ include "cluster.namespace" . }}
  labels:
    {{- include "cluster.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "cluster.recoverySecretName" . }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: ACCESS_REGION
      remoteRef:
        key: {{ .Values.recovery.objectStore.externalSecret.credentialPath | required "External Secret Credential local path is required" }}
        property: ACCESS_REGION
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.recovery.objectStore.externalSecret.credentialPath | required "External Secret Credential local path is required" }}
        property: ACCESS_KEY_ID
    - secretKey: ACCESS_SECRET_KEY
      remoteRef:
        key: {{ .Values.recovery.objectStore.externalSecret.credentialPath | required "External Secret Credential local path is required" }}
        property: ACCESS_SECRET_KEY

{{- with .Values.recovery.objectStore.endpointCA }}
{{- if .createExternalSecret }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "cluster.recoveryCaSecretName" $ }}
  namespace: {{ include "cluster.namespace" $ }}
  labels:
    app.kubernetes.io/name: {{ include "cluster.recoveryCaSecretName" $ }}
    {{- include "cluster.labels" $ | nindent 4 }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  data:
    - secretKey: {{ .key | default "ca.crt" }}
      remoteRef:
        key: {{ .externalSecretCredentialPath | required "External Secret Credential local path is required for CA" }}
        property: {{ .externalSecretProperty | default "ca.crt" }}
{{- end }}
{{- end }}
{{- end }}
