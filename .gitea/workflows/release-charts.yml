name: release-charts

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"

  workflow_dispatch:
    inputs:
      chart:
        description: "Specific chart to release (leave empty for all)"
        required: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Get Changed Charts
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -n "${{ inputs.chart }}" ]; then
              echo "matrix=[\"${{ inputs.chart }}\"]" >> $GITEA_OUTPUT
              exit 0

            else
              CHARTS=($(ls -1d charts/*/ | awk -F '/' '{print $2}'))

            fi
          else
            GIT_DIFF=$(git diff --name-only ${{ gitea.event.before }}..HEAD | grep -E "^charts/" || true)
            CHARTS=()
            if [ -n "$GIT_DIFF" ]; then
              for path in $GIT_DIFF; do
                chart_name=$(echo "$path" | awk -F '/' '{print $2}')
                if [ -n "$chart_name" ]; then
                  CHARTS+=("$chart_name")

                fi
              done
            fi
          fi

          if [ ${#CHARTS[@]} -gt 0 ]; then
            UNIQUE_CHARTS=$(printf "%s\n" "${CHARTS[@]}" | sort -u | awk '{printf "\"%s\",", $0}' | sed 's/,$//')
            echo "matrix=[$UNIQUE_CHARTS]" >> $GITEA_OUTPUT

          else
            echo "matrix=[]" >> $GITEA_OUTPUT

          fi

  release:
    needs: prepare
    if: needs.prepare.outputs.matrix != '[]' && needs.prepare.outputs.matrix != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart: [cloudflared, generic-device-plugin, postgres-cluster, rclone-bucket, valkey, volsync-target]
      fail-fast: false
    steps:
      - name: Check if chart should be processed
        id: check
        run: |
          CHARTS='${{ needs.prepare.outputs.matrix }}'
          if echo "$CHARTS" | grep -q "\"${{ matrix.chart }}\""; then
            echo "process=true" >> $GITEA_OUTPUT
          else
            echo "process=false" >> $GITEA_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.process == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Helm
        if: steps.check.outputs.process == 'true'
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          token: ${{ secrets.GITEA_TOKEN }}
          version: v4.2.3

      - name: Add Repositories
        if: steps.check.outputs.process == 'true'
        env:
          CHART_NAME: ${{ matrix.chart }}
        run: |
          cd charts/${CHART_NAME}

          echo ">> Adding repositories for chart dependencies ..."
          helm dependency list . --max-col-width 120 2> /dev/null \
            | tail +2 | head -n -1 \
            | awk '{ print "helm repo add " $1 " " $3 }' \
            | while read cmd; do echo "$cmd" | sh; done || true

          if helm repo list | tail +2 | read -r; then
            echo ">> Update repository cache ..."
            helm repo update

          fi

          echo "----"

      - name: Package Helm Chart
        if: steps.check.outputs.process == 'true'
        env:
          CHART_NAME: ${{ matrix.chart }}
        run: |
          echo ">> Packaging chart: ${CHART_NAME}"
          cd charts/${CHART_NAME}

          echo ">> Building helm dependency ..."
          helm dependency build . --skip-refresh --debug

          echo "----"

          echo "PACKAGE_PATH=$(helm package . | awk '{print $NF}')" >> $GITEA_ENV

      - name: Publish Helm Chart to Harbor
        if: steps.check.outputs.process == 'true'
        run: |
          echo ">> Logging into Harbor ..."
          helm registry login ${{ vars.REGISTRY_HOST }} -u ${{ vars.REGISTRY_USER }} -p ${{ secrets.REGISTRY_SECRET }} --debug

          echo ""
          echo ">> Publishing chart to Harbor ..."
          helm push ${{ env.PACKAGE_PATH }} oci://${{ vars.REGISTRY_HOST }}/helm-charts --debug

          echo "----"

      - name: Publish Helm Chart to Gitea
        if: steps.check.outputs.process == 'true'
        run: |
          echo ">> Installing Chart Museum plugin ..."
          helm plugin install https://github.com/chartmuseum/helm-push --verify=false --debug

          echo ""
          echo ">> Adding Gitea repository ..."
          helm repo add --username ${{ gitea.actor }} --password ${{ secrets.REPOSITORY_TOKEN }} helm-charts https://${{ vars.REPOSITORY_HOST }}/api/packages/alexlebens/helm --debug

          echo ""
          echo ">> Pushing chart to gitea"
          helm cm-push ${{ env.PACKAGE_PATH }} helm-charts --debug

      - name: Extract Chart Metadata
        if: steps.check.outputs.process == 'true'
        env:
          CHART_NAME: ${{ matrix.chart }}
        run: |
          cd charts/${CHART_NAME}

          echo ">> Adding Chart metadata to workflow ENV ..."
          echo ""
          echo ">> Chart Version: $(yq '.version' Chart.yaml)"
          echo ">> Chart Name: $(yq '.name' Chart.yaml)"

          echo "----"

          echo "CHART_VERSION=$(yq '.version' Chart.yaml)" >> $GITEA_ENV
          echo "CHART_NAME=$(yq '.name' Chart.yaml)" >> $GITEA_ENV

      - name: Release Helm Chart
        if: steps.check.outputs.process == 'true'
        uses: akkuman/gitea-release-action@b8d9144f302c68610911db1aaf722708d5c02d94 # v1
        with:
          name: ${{ env.CHART_NAME }}-${{ env.CHART_VERSION }}
          tag_name: ${{ env.CHART_NAME }}-${{ env.CHART_VERSION }}
          files: |-
            ${{ env.PACKAGE_PATH }}

      - name: ntfy Success
        uses: niniyas/ntfy-action@28b287a465c540fb48ff37c0b542fa0efd0ec31e # master
        if: success() && steps.check.outputs.process == 'true'
        with:
          url: "${{ secrets.NTFY_URL }}"
          topic: "${{ secrets.NTFY_TOPIC }}"
          title: "Release Success - ${{ env.CHART_NAME }}"
          priority: 3
          headers: '{"Authorization": "Bearer ${{ secrets.NTFY_CRED }}"}'
          tags: action,successfully,completed
          details: "Helm Chart ${{ env.CHART_NAME }}-${{ env.CHART_VERSION }} has been released!"
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/png/gitea.png"

      - name: ntfy Failed
        uses: niniyas/ntfy-action@28b287a465c540fb48ff37c0b542fa0efd0ec31e # master
        if: failure() && steps.check.outputs.process == 'true'
        with:
          url: "${{ secrets.NTFY_URL }}"
          topic: "${{ secrets.NTFY_TOPIC }}"
          title: "Release Failure - ${{ matrix.chart }}"
          priority: 4
          headers: '{"Authorization": "Bearer ${{ secrets.NTFY_CRED }}"}'
          tags: action,failed
          details: "Helm Chart ${{ matrix.chart }} has failed to be released."
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/png/gitea.png"
          actions: '[{"action": "view", "label": "Open Gitea", "url": "https://gitea.alexlebens.dev/alexlebens/helm-charts/actions?workflow=release-charts.yml", "clear": true}]'
          image: true
