name: lint-test

on:
  pull_request:
    branches:
      - main
    paths:
      - "charts/**"

  push:
    branches:
      - main
    paths:
      - "charts/**"

env:
  BASE_BRANCH: "origin/${{ gitea.base_ref }}"

jobs:
  chart-testing:
    runs-on: ubuntu-latest
    env:
      # renovate: datasource=github-releases depName=helm/chart-testing
      CT_VERSION: v3.12.0
      # renovate: datasource=pypi depName=yamale
      YAMALE_VERSION: 6.0.0
      # renovate: datasource=pypi depName=yamllint
      YAMLLINT_VERSION: 1.35.1
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          token: ${{ secrets.GITEA_TOKEN }}
          version: v4.2.3

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Cache Tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.ct-bin
            ~/.ct
            ~/.cache/pip
          key: tools-${{ runner.os }}-ct-${{ env.CT_VERSION }}-pip-${{ env.YAMLLINT_VERSION }}-${{ env.YAMALE_VERSION }}

      - name: Set up Chart Testing
        run: |
          if [ ! -f "$HOME/.ct-bin/ct" ]; then
            # Strip the 'v' prefix for the tarball name
            CT_VERSION_NO_V=${CT_VERSION#v}
            curl -sSLo ct.tar.gz "https://github.com/helm/chart-testing/releases/download/${CT_VERSION}/chart-testing_${CT_VERSION_NO_V}_linux_amd64.tar.gz"
            tar -xzf ct.tar.gz
            mkdir -p $HOME/.ct-bin
            mv ct $HOME/.ct-bin/
            mkdir -p $HOME/.ct
            mv etc/* $HOME/.ct/
          fi
          echo "$HOME/.ct-bin" >> $GITHUB_PATH
          pip3 install yamllint==${YAMLLINT_VERSION} yamale==${YAMALE_VERSION}

      - name: Run Chart Testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ gitea.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo ""
            echo ">> Changed Charts:"
            echo "$(echo "${changed}" | sort -u)"

            echo "----"

            echo "changed=true" >> $GITHUB_OUTPUT
            echo "changed-charts=$changed" >> $GITHUB_OUTPUT

          fi

      - name: Add Repositories
        if: steps.list-changed.outputs.changed == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.list-changed.outputs.changed-charts }}
        run: |
          echo ">> Adding repositories for chart dependencies ..."
          for dir in ${CHANGED_CHARTS}; do
            helm dependency list --max-col-width 120 $dir 2> /dev/null \
              | tail +2 | head -n -1 \
              | awk '{ print "helm repo add " $1 " " $3 }' \
              | while read cmd; do
                if [[ "$cmd" == "*oci://*" ]]; then
                  echo ">> Ignoring OCI repo"

                else
                  echo "$cmd" | sh;

                fi
              done || true
          done

          if helm repo list | tail +2 | read -r; then
            echo ""
            echo ">> Update repository cache ..."
            helm repo update

          fi

          echo "----"

      - name: Run Chart Testing (lint)
        id: ct-lint
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --validate-maintainers=false --target-branch ${{ gitea.event.repository.default_branch }}

      - name: ntfy Chart Testing Lint Failed
        uses: niniyas/ntfy-action@28b287a465c540fb48ff37c0b542fa0efd0ec31e # master
        if: failure() && steps.ct-lint.outcome == 'failure'
        with:
          url: "${{ secrets.NTFY_URL }}"
          topic: "${{ secrets.NTFY_TOPIC }}"
          title: "Chart Testing Lint Failure - Helm Charts"
          priority: 3
          headers: '{"Authorization": "Bearer ${{ secrets.NTFY_CRED }}"}'
          tags: action,failed
          details: "Chart Testing (ct lint) has failed for Helm Charts"
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/png/gitea.png"
          actions: '[{"action": "view", "label": "View Run", "url": "${{ vars.USER_URL }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "clear": true}]'
          image: true

      - name: ntfy Chart Testing List Changed Failed
        uses: niniyas/ntfy-action@28b287a465c540fb48ff37c0b542fa0efd0ec31e # master
        if: failure() && steps.list-changed.outcome == 'failure'
        with:
          url: "${{ secrets.NTFY_URL }}"
          topic: "${{ secrets.NTFY_TOPIC }}"
          title: "Chart Testing List Failure - Helm Charts"
          priority: 3
          headers: '{"Authorization": "Bearer ${{ secrets.NTFY_CRED }}"}'
          tags: action,failed
          details: "Chart Testing (ct list-changed) has failed for Helm Charts"
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/png/gitea.png"
          actions: '[{"action": "view", "label": "View Run", "url": "${{ vars.USER_URL }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "clear": true}]'
          image: true

      - name: ntfy Chart Testing Pipeline Failed
        uses: niniyas/ntfy-action@28b287a465c540fb48ff37c0b542fa0efd0ec31e # master
        if: failure() && steps.ct-lint.outcome != 'failure' && steps.list-changed.outcome != 'failure'
        with:
          url: "${{ secrets.NTFY_URL }}"
          topic: "${{ secrets.NTFY_TOPIC }}"
          title: "Chart Testing Pipeline Failure - Helm Charts"
          priority: 3
          headers: '{"Authorization": "Bearer ${{ secrets.NTFY_CRED }}"}'
          tags: action,failed
          details: "An unexpected error occurred during Chart Testing pipeline setup"
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/png/gitea.png"
          actions: '[{"action": "view", "label": "View Run", "url": "${{ vars.USER_URL }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "clear": true}]'
          image: true

  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Check Branch Exists
        id: check-branch-exists
        if: github.event_name == 'pull_request'
        uses: GuillaumeFalourd/branch-exists@650358876c774d6ccbd581b5553eb636dab79a97 # v1.2
        with:
          branch: ${{ gitea.base_ref }}

      - name: Report Branch Exists
        id: branch-exists
        if: github.event_name == 'push' || steps.check-branch-exists.outputs.exists == 'true' && github.event_name == 'pull_request'
        run: |
          if [ ${{ github.event_name == 'push' }} ]; then
            echo ">> Action is from a push event, will continue with linting"

          else
            echo ">> Branch ${{ gitea.base_ref }} exists, will continue with linting"

          fi

          echo "----"

          echo "exists=true" >> $GITEA_OUTPUT

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        if: steps.branch-exists.outputs.exists == 'true'
        with:
          token: ${{ secrets.GITEA_TOKEN }}
          version: v4.2.3

      - name: Cache Helm Plugins
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        if: steps.branch-exists.outputs.exists == 'true'
        id: cache-helm-plugins
        with:
          path: ~/.local/share/helm/plugins
          key: helm-plugins-${{ runner.os }}-unittest

      - name: Install Helm Unittest Plugin
        if: steps.branch-exists.outputs.exists == 'true' && steps.cache-helm-plugins.outputs.cache-hit != 'true'
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --verify=false

      - name: Check Directories for Changes
        id: check-dir-changes
        if: steps.branch-exists.outputs.exists == 'true'
        run: |
          CHANGED_CHARTS=()

          echo ">> Target branch for diff is: ${BASE_BRANCH}"

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo ""
            echo ">> Checking for changes in a pull request ..."
            GIT_DIFF=$(git diff --name-only "${BASE_BRANCH}" | xargs -I {} dirname {} | sort -u | grep -E "charts/")

          else
            echo ""
            echo ">> Checking for changes from a push ..."
            GIT_DIFF=$(git diff --name-only ${{ gitea.event.before }}..HEAD | xargs -I {} dirname {} | sort -u | grep -E "charts/")

          fi

          if [ -n "${GIT_DIFF}" ]; then
            echo ""
            echo ">> Changes detected:"
            echo "$GIT_DIFF"

            for path in $GIT_DIFF; do
              CHANGED_CHARTS+=$(echo "$path" | awk -F '/' '{print $2}')
              CHANGED_CHARTS+=$(echo " ")

            done

          else
            echo ""
            echo ">> No changes detected"

          fi

          if [ -n "${CHANGED_CHARTS}" ]; then
            echo ""
            echo ">> Chart to Lint:"
            echo "$(echo "${CHANGED_CHARTS}" | sort -u)"

            echo "----"

            echo "changes-detected=true" >> $GITEA_OUTPUT
            echo "chart-dir<<EOF" >> $GITEA_OUTPUT
            echo "$(echo "${CHANGED_CHARTS}" | sort -u)" >> $GITEA_OUTPUT
            echo "EOF" >> $GITEA_OUTPUT

          else
            echo "changes-detected=false" >> $GITEA_OUTPUT

          fi

      - name: Add Repositories
        if: steps.check-dir-changes.outputs.changes-detected == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.check-dir-changes.outputs.chart-dir }}
        run: |
          echo ">> Adding repositories for chart dependencies ..."
          for dir in ${CHANGED_CHARTS}; do
            helm dependency list --max-col-width 120 charts/$dir 2> /dev/null \
              | tail +2 | head -n -1 \
              | awk '{ print "helm repo add " $1 " " $3 }' \
              | while read cmd; do
                if [[ "$cmd" == "*oci://*" ]]; then
                  echo ">> Ignoring OCI repo"

                else
                  echo "$cmd" | sh;

                fi
              done || true
          done

          if helm repo list | tail +2 | read -r; then
            echo ""
            echo ">> Update repository cache ..."
            helm repo update

          fi

          echo "----"

      - name: Lint Helm Chart
        id: lint-helm-chart
        if: steps.check-dir-changes.outputs.changes-detected == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.check-dir-changes.outputs.chart-dir }}
        run: |
          echo ">> Running linting on changed charts ..."

          for dir in ${CHANGED_CHARTS}; do
            chart_path=charts/$dir
            chart_name=$(basename "$chart_path")

            if [ -f "$chart_path/Chart.yaml" ]; then
              (
                cd $chart_path
                echo ""
                echo ">> Building helm dependency ..."
                helm dependency build . --skip-refresh

                echo ""
                echo ">> Linting helm ..."
                helm lint . --namespace "$chart_name"
              )
            else
              echo ""
              echo ">> Directory $chart_path does not contain a Chart.yaml. Skipping ..."
              echo ""
            fi
          done

      - name: Run Helm Unittest
        id: run-helm-unittest
        if: steps.check-dir-changes.outputs.changes-detected == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.check-dir-changes.outputs.chart-dir }}
        run: |
          echo ">> Running unittest on changed charts ..."

          for dir in ${CHANGED_CHARTS}; do
            chart_path=charts/$dir

            if [ -d "$chart_path/tests" ]; then
              (
                cd $chart_path
                echo ""
                echo ">> Running helm unittest ..."
                helm unittest .
              )

            else
              echo ""
              echo ">> No tests found in $chart_path/tests, skipping ..."
              echo ""

            fi
          done

      - name: ntfy Lint Failed
        uses: niniyas/ntfy-action@28b287a465c540fb48ff37c0b542fa0efd0ec31e # master
        if: failure() && steps.lint-helm-chart.outcome == 'failure'
        with:
          url: "${{ secrets.NTFY_URL }}"
          topic: "${{ secrets.NTFY_TOPIC }}"
          title: "Lint Failure - Helm Charts"
          priority: 3
          headers: '{"Authorization": "Bearer ${{ secrets.NTFY_CRED }}"}'
          tags: action,failed
          details: "Linting failed for Helm Charts"
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/png/gitea.png"
          actions: '[{"action": "view", "label": "View Run", "url": "${{ vars.USER_URL }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "clear": true}]'
          image: true

      - name: ntfy Unittest Failed
        uses: niniyas/ntfy-action@28b287a465c540fb48ff37c0b542fa0efd0ec31e # master
        if: failure() && steps.run-helm-unittest.outcome == 'failure'
        with:
          url: "${{ secrets.NTFY_URL }}"
          topic: "${{ secrets.NTFY_TOPIC }}"
          title: "Unittest Failure - Helm Charts"
          priority: 3
          headers: '{"Authorization": "Bearer ${{ secrets.NTFY_CRED }}"}'
          tags: action,failed
          details: "Unit testing failed for Helm Charts"
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/png/gitea.png"
          actions: '[{"action": "view", "label": "View Run", "url": "${{ vars.USER_URL }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "clear": true}]'
          image: true

      - name: ntfy Pipeline Failed
        uses: niniyas/ntfy-action@28b287a465c540fb48ff37c0b542fa0efd0ec31e # master
        if: failure() && steps.lint-helm-chart.outcome != 'failure' && steps.run-helm-unittest.outcome != 'failure'
        with:
          url: "${{ secrets.NTFY_URL }}"
          topic: "${{ secrets.NTFY_TOPIC }}"
          title: "Pipeline Failure - Helm Charts"
          priority: 3
          headers: '{"Authorization": "Bearer ${{ secrets.NTFY_CRED }}"}'
          tags: action,failed
          details: "An unexpected error occurred during pipeline setup"
          icon: "https://cdn.jsdelivr.net/gh/selfhst/icons/png/gitea.png"
          actions: '[{"action": "view", "label": "View Run", "url": "${{ vars.USER_URL }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "clear": true}]'
          image: true
